site_name: EECS-Self-Learning
repo_name: franken-st3in/frank.github.io
repo_url: https://github.com/franken-st3in/frank.github.io # Adds the GitHub logo top right

theme:
  name: material
  features:
    - navigation.top       # Adds a "back to top" button when scrolling
    - search.suggest       # Makes the search bar smarter
    - search.highlight     # Highlights your search terms
  palette:
    # Light Mode Settings
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: cyan        # This gives you that exact cyan top bar!
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark Mode Settings
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: cyan
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# Your navigation stays exactly the same down here
nav:
  - Home: index.md
  - Courses:
    - MIT 6.100L: 6-100L.md
